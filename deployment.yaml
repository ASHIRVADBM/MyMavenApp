apiVersion: apps/v1
kind: Deployment
metadata:
  name: mymavenapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mymavenapp
  template:
    metadata:
      labels:
        app: mymavenapp
    spec:
      containers:
      - name: mymavenapp
        image: ashirvadbm/mymavenapp:latest
        ports:
        - containerPort: 8080
